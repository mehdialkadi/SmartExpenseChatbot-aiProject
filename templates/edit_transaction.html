<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Transaction</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
            color: #333;
        }
        header {
            background-color: #4CAF50;
            color: white;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        header h1 {
            margin: 0;
            font-size: 2.5rem;
        }
        .container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #4CAF50;
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        label {
            font-weight: bold;
            margin-bottom: 0.5rem;
        }
        input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            cursor: pointer;
            border-radius: 5px;
            font-size: 1rem;
            align-self: center;
        }
        button:hover {
            background-color: #45a049;
        }
        nav {
            text-align: center;
            margin-top: 1rem;
        }
        nav a {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            background-color: #4CAF50;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 5px;
        }
        nav a span {
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>Edit Transaction</h1>
        <nav>
            <a href="/" style="text-decoration: none;">
                <span>🏠</span> Home
            </a>
        </nav>
    </header>

    <div class="container">
        <form action="/update_transaction/{{ transaction.id }}" method="POST">
            <label for="description">Description</label>
            <input type="text" id="description" name="description" value="{{ transaction.description }}" required>

            <label for="category">Category</label>
            <input type="text" id="category" name="category" value="{{ transaction.category }}" required>

            <label for="amount">Amount</label>
            <input type="number" step="0.01" id="amount" name="amount" value="{{ transaction.amount }}" required>

            <label for="date">Date</label>
            <input type="date" id="date" name="date" value="{{ transaction.date }}" required>

            <button type="submit">Save Changes</button>
        </form>
    </div>
</body>
</html>
